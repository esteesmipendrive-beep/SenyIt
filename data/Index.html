<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacha | Gimnasio Dialéctico</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Panel Izquierdo: El Reto -->
        <aside class="panel-reto">
            <span id="categoria-tag" class="tag">Cargando...</span>
            <h1 id="titulo-caso">Preparando el hacha...</h1>
            <p id="estimulo-texto"></p>
            <div class="restriccion-box">
                <strong>REGLA ESTRICTA:</strong>
                <p id="restriccion-texto"></p>
            </div>
        </aside>

        <!-- Panel Derecho: El Editor -->
        <main class="panel-editor">
            <textarea id="editor" placeholder="Tu análisis comienza aquí..."></textarea>
            <div class="status-bar">
                <span id="contador-palabras">0 palabras</span>
                <button id="btn-guardar" disabled>Reflexión Insuficiente</button>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
